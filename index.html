<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi Selfie</title>
</head>

<body>

<h2>Absensi Selfie</h2>

<input type="text" id="nama" placeholder="Masukkan Nama">

<br><br>

<video id="video" autoplay playsinline width="300"></video>

<br><br>

<button onclick="aktifkanKamera()">Aktifkan Kamera</button>
<button onclick="ambilFoto()">Ambil Foto</button>
<button onclick="simpanFoto()">💾 Simpan Foto</button>
<br><br>

<canvas id="canvas" style="display:none;"></canvas>

<img id="hasilFoto" width="300">

<p id="waktu"></p>
<p id="lokasi"></p>

<script>

function aktifkanKamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(function(stream) {
    document.getElementById("video").srcObject = stream;
  })
  .catch(function() {
    alert("Kamera tidak bisa dibuka");
  });
}

function ambilFoto() {

  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext("2d");

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  let nama = document.getElementById("nama").value;
  let waktu = new Date().toLocaleString();

  navigator.geolocation.getCurrentPosition(function(pos) {

    let gps = pos.coords.latitude + ", " + pos.coords.longitude;

    ctx.fillStyle = "red";
    ctx.font = "20px Arial";

    ctx.fillText("Nama: " + nama, 10, 30);
    ctx.fillText("Waktu: " + waktu, 10, 60);
    ctx.fillText("GPS: " + gps, 10, 90);

    let foto = canvas.toDataURL("image/png");

    document.getElementById("hasilFoto").src = foto;
    document.getElementById("waktu").innerHTML = "Waktu: " + waktu;
    document.getElementById("lokasi").innerHTML = "GPS: " + gps;

    alert("Foto absensi berhasil diambil");

  }, function() {

    alert("GPS tidak diizinkan");

  });

}
function simpanFoto() {

    let foto = document.getElementById("hasilFoto").src;

    if (!foto) {
        alert("Ambil foto terlebih dahulu");
        return;
    }

    let link = document.createElement("a");
    link.href = foto;
    link.download = "absensi.png";
    link.click();
  }
</script>

</body>
</html>
